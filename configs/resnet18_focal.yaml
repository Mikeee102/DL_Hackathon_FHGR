run_name: resnet18_focal
seed: 42

data:
  train_csv: data/splits/train.csv
  val_csv: data/splits/val.csv
  test_csv: data/splits/test.csv
  image_root: null
  image_size: 224

model:
  name: resnet18
  pretrained: true
  dropout: 0.2

training:
  run_dir: reports/runs
  epochs: 25
  batch_size: 64
  num_workers: 4
  amp: true

  lr_head: 0.001
  lr_backbone: 0.0001
  weight_decay: 0.0001

  # Run 2 (Ablation): natuerliche Verteilung + Focal Loss.
  # Kein Sampler, kein pos_weight — Focal soll allein reichen.
  loss: focal
  focal_alpha: 0.25
  focal_gamma: 2.0
  sampler: none

  early_stop_patience: 6
  head_only_epochs: 3
